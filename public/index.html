<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPM Automation Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-indigo-600 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <span class="text-white font-bold text-xl tracking-tight">GPM Automation Hub</span>
                </div>
                <button onclick="fetchStats()" class="bg-indigo-500 hover:bg-indigo-400 text-white px-3 py-2 rounded-md text-sm font-medium transition duration-150 ease-in-out">
                    Refresh Data
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Stats Row -->
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Today's Overview</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <!-- Cards will be populated by JS -->
            <!-- Active/Dead -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <div class="flex items-center">
                    <div class="flex-shrink-0 bg-green-100 rounded-md p-3">
                        <svg class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                        </svg>
                    </div>
                    <div class="ml-5 w-0 flex-1">
                        <dl>
                            <dt class="text-sm font-medium text-gray-500 truncate">Profiles Status</dt>
                            <dd class="text-lg font-bold text-gray-900 mt-1">
                                <span id="stat-active" class="text-green-600">0</span> Active
                                <span class="text-gray-300 mx-2">|</span>
                                <span id="stat-dead" class="text-red-500">0</span> Dead
                            </dd>
                        </dl>
                    </div>
                </div>
            </div>

            <!-- Likes -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <div class="flex items-center">
                    <div class="flex-shrink-0 bg-blue-100 rounded-md p-3">
                        <svg class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21h-4.017c-.163 0-.326-.02-.485-.06L7 20m7-10V5a2 2 0 00-2-2h-.095c-.5 0-.905.405-.905.905 0 .714-.211 1.412-.608 2.006L7 11v9m7-10h-2M7 20H5a2 2 0 01-2-2v-6a2 2 0 012-2h2.5" />
                        </svg>
                    </div>
                    <div class="ml-5 w-0 flex-1">
                        <dl>
                            <dt class="text-sm font-medium text-gray-500 truncate">Total Likes</dt>
                            <dd class="text-2xl font-bold text-gray-900" id="stat-likes">0</dd>
                        </dl>
                    </div>
                </div>
            </div>

            <!-- Comments -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <div class="flex items-center">
                    <div class="flex-shrink-0 bg-yellow-100 rounded-md p-3">
                        <svg class="h-6 w-6 text-yellow-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                        </svg>
                    </div>
                    <div class="ml-5 w-0 flex-1">
                        <dl>
                            <dt class="text-sm font-medium text-gray-500 truncate">Total Comments</dt>
                            <dd class="text-2xl font-bold text-gray-900" id="stat-comments">0</dd>
                        </dl>
                    </div>
                </div>
            </div>

            <!-- Shares/Views -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <div class="flex items-center">
                    <div class="flex-shrink-0 bg-purple-100 rounded-md p-3">
                        <svg class="h-6 w-6 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                        </svg>
                    </div>
                    <div class="ml-5 w-0 flex-1">
                        <dl>
                            <dt class="text-sm font-medium text-gray-500 truncate">Shares / Views</dt>
                            <dd class="text-lg font-bold text-gray-900 mt-1">
                                <span id="stat-shares">0</span> S <span class="text-gray-300 mx-2">|</span> <span id="stat-views">0</span> V
                            </dd>
                        </dl>
                    </div>
                </div>
            </div>
        </div>

        <!-- System Table -->
        <h2 class="text-2xl font-bold text-gray-800 mb-6 mt-10">Profiles Tracker</h2>
        <div class="bg-white shadow-sm border border-gray-100 rounded-lg overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Profile Name</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Last Ping</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Last Upload</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Posts Today</th>
                    </tr>
                </thead>
                <tbody id="profiles-tbody" class="bg-white divide-y divide-gray-200">
                    <!-- Rows injected via JS -->
                    <tr><td colspan="5" class="px-6 py-4 text-center text-gray-500 text-sm">Loading data...</td></tr>
                </tbody>
            </table>
        </div>

    </main>

    <!-- Interaction Modal -->
    <div id="interaction-modal" class="fixed inset-0 z-50 hidden bg-gray-500 bg-opacity-75 flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl overflow-hidden w-11/12 md:max-w-3xl border border-gray-200">
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                <h3 class="text-lg font-bold text-gray-900" id="modal-title">Profile Activity</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-500 focus:outline-none transition-colors">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="px-6 py-4 max-h-[60vh] overflow-y-auto bg-white">
                <ul id="interaction-list" class="divide-y divide-gray-100">
                    <li class="py-4 text-center text-sm text-gray-500">Loading interactions...</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        function formatRelativeTime(dateStr) {
            if (!dateStr || dateStr.startsWith("0001-01-01")) return "Never";
            const date = new Date(dateStr);
            const now = new Date();
            const diffSec = Math.floor((now - date) / 1000);
            
            if (diffSec < 60) return "Just now";
            if (diffSec < 3600) return `${Math.floor(diffSec/60)} mins ago`;
            if (diffSec < 86400) return `${Math.floor(diffSec/3600)} hours ago`;
            return `${Math.floor(diffSec/86400)} days ago`;
        }

        function closeModal() {
            document.getElementById('interaction-modal').classList.add('hidden');
        }

        const typeColors = {
            'post': 'bg-indigo-100 text-indigo-800 border bg-indigo-50 border-indigo-200',
            'like': 'bg-blue-100 text-blue-800 border border-blue-200',
            'comment': 'bg-yellow-100 text-yellow-800 border border-yellow-200',
            'share': 'bg-purple-100 text-purple-800 border border-purple-200',
            'view': 'bg-green-100 text-green-800 border border-green-200'
        };

        async function showProfileDetails(profileName) {
            document.getElementById('modal-title').innerText = `Recent Activity: ${profileName}`;
            const list = document.getElementById('interaction-list');
            list.innerHTML = `<li class="py-4 text-center text-sm text-gray-500">Loading data from database...</li>`;
            document.getElementById('interaction-modal').classList.remove('hidden');

            try {
                const res = await fetch(`/api/stats/profile/${profileName}/interactions`);
                if (res.ok) {
                    const data = await res.json();
                    list.innerHTML = '';
                    if (data.length === 0) {
                        list.innerHTML = `<li class="py-8 text-center text-sm text-gray-500 italic">No recent activity detected.</li>`;
                        return;
                    }

                    data.forEach(it => {
                        const colorClass = typeColors[it.type] || 'bg-gray-100 text-gray-800 border border-gray-200';
                        const badge = `<span class="px-2.5 py-1 rounded-md text-[10px] font-bold tracking-wider uppercase ${colorClass} shadow-sm">${it.type}</span>`;
                        
                        let targetText = it.video_id;
                        if (!targetText) targetText = "N/A";
                        let isUrl = targetText.startsWith('http');
                        
                        let targetLink = `<a href="${isUrl ? targetText : 'https://facebook.com/' + targetText}" target="_blank" class="text-blue-600 hover:text-blue-800 hover:underline font-mono text-sm">${targetText}</a>`;

                        let detailHtml = `<p class="text-sm text-gray-900 truncate"><span class="text-gray-500 text-xs uppercase tracking-wider mr-2 font-semibold">Target</span> ${targetLink}</p>`;
                        
                        if (it.details) {
                            detailHtml += `<p class="text-sm text-gray-600 mt-1.5 bg-gray-50 p-2 rounded border border-gray-100 font-serif italic">${it.details}</p>`;
                        }

                        const li = document.createElement('li');
                        li.className = 'py-4 hover:bg-gray-50 transition-colors px-2 -mx-2 rounded-lg';
                        li.innerHTML = `
                            <div class="flex space-x-3 items-start">
                                <div class="flex-1 space-y-1">
                                    <div class="flex items-start justify-between">
                                        <div class="flex-1 pr-4 whitespace-normal overflow-hidden break-all">
                                            ${detailHtml}
                                        </div>
                                        <div class="flex flex-col items-end shrink-0 space-y-2">
                                            ${badge}
                                            <span class="text-[11px] font-medium text-gray-400 whitespace-nowrap">${it.created_at}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                        list.appendChild(li);
                    });
                }
            } catch (err) {
                list.innerHTML = `<li class="py-4 text-center text-sm text-red-500">Failed to load data.</li>`;
            }
        }

        async function fetchStats() {
            try {
                // Fetch Overview
                const resOverview = await fetch('/api/stats/overview');
                if (resOverview.ok) {
                    const data = await resOverview.json();
                    document.getElementById('stat-active').innerText = data.active_profiles;
                    document.getElementById('stat-dead').innerText = data.dead_profiles;
                    document.getElementById('stat-likes').innerText = data.likes_today;
                    document.getElementById('stat-comments').innerText = data.comments_today;
                    document.getElementById('stat-shares').innerText = data.shares_today;
                    document.getElementById('stat-views').innerText = data.views_today;
                }

                // Fetch Profiles
                const resProfiles = await fetch('/api/stats/profiles');
                if (resProfiles.ok) {
                    const profiles = await resProfiles.json();
                    const tbody = document.getElementById('profiles-tbody');
                    tbody.innerHTML = '';
                    
                    if(profiles.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-4 text-center text-gray-500">No profiles found in Database.</td></tr>`;
                    }
                    
                    profiles.forEach(p => {
                        const isDead = p.Status === 'Dead';
                        const statusBadge = isDead 
                            ? `<span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800">Dead</span>`
                            : `<span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">Active</span>`;

                        const tr = document.createElement('tr');
                        tr.className = (isDead ? 'bg-red-50/10 opacity-75' : 'hover:bg-gray-100') + ' cursor-pointer transition-colors';
                        tr.onclick = () => showProfileDetails(p.Name);
                        tr.innerHTML = `
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${p.Name}</td>
                            <td class="px-6 py-4 whitespace-nowrap">${statusBadge}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${formatRelativeTime(p.LastPingAt)}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${formatRelativeTime(p.LastUpload)}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                <div class="flex items-center">
                                    <div class="w-16 bg-gray-200 rounded-full h-2 mr-2">
                                        <div class="bg-indigo-600 h-2 rounded-full" style="width: ${(p.DailyCount / p.DailyLimit) * 100}%"></div>
                                    </div>
                                    <span>${p.DailyCount}/${p.DailyLimit}</span>
                                </div>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch (error) {
                console.error("Failed to load dashboard data", error);
            }
        }

        // Auto-refresh every 30 seconds
        setInterval(fetchStats, 30000);
        
        // Initial load
        window.addEventListener('DOMContentLoaded', fetchStats);
    </script>
</body>
</html>
